<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Filler</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="../icons/icon.svg" alt="" class="header-icon">
      <h1>Job Filler</h1>
    </header>

    <div class="section">
      <h2>Personal Info</h2>
      <div class="row-2">
        <div class="field-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" placeholder="Fernando" autocomplete="off">
        </div>
        <div class="field-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder="Borbon" autocomplete="off">
        </div>
      </div>
      <div class="row-2">
        <div class="field-group">
          <label for="pronoun">Pronoun</label>
          <input type="text" id="pronoun" placeholder="He/Him" autocomplete="off">
        </div>
        <div class="field-group">
          <label for="availability">Availability</label>
          <input type="text" id="availability" placeholder="Immediately" autocomplete="off">
        </div>
      </div>
      <div class="field-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="ferborbon77@hotmail.com" autocomplete="off">
      </div>
      <div class="row-phone">
        <div class="field-group">
          <label for="phoneCountry">Country Code</label>
          <input type="tel" id="phoneCountry" placeholder="+34" autocomplete="off">
        </div>
        <div class="field-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="717712853" autocomplete="off">
        </div>
      </div>
      <div class="field-group">
        <label for="address">Address</label>
        <input type="text" id="address" placeholder="Pamplona" autocomplete="off">
      </div>
      <div class="row-2">
        <div class="field-group">
          <label for="city">City</label>
          <input type="text" id="city" placeholder="Pamplona" autocomplete="off">
        </div>
        <div class="field-group">
          <label for="province">Province / State</label>
          <input type="text" id="province" placeholder="Navarre" autocomplete="off">
        </div>
      </div>
      <div class="field-group">
        <label for="country">Country</label>
        <input type="text" id="country" placeholder="Spain" autocomplete="off">
      </div>
    </div>

    <div class="section">
      <h2>Professional Links</h2>
      <div class="field-group">
        <label for="linkedin">LinkedIn URL</label>
        <input type="url" id="linkedin" placeholder="https://linkedin.com/in/you" autocomplete="off">
      </div>
      <div class="field-group">
        <label for="github">GitHub URL</label>
        <input type="url" id="github" placeholder="https://github.com/you" autocomplete="off">
      </div>
      <div class="field-group">
        <label for="website">Website / Portfolio</label>
        <input type="url" id="website" placeholder="https://yoursite.com" autocomplete="off">
      </div>
    </div>

    <div class="section">
      <h2>Cover Letter Text</h2>
      <div class="field-group">
        <textarea id="coverLetterText" placeholder="Write your cover letter here…" rows="4"></textarea>
      </div>
    </div>

    <div class="section">
      <h2>Documents</h2>
      <div class="file-field">
        <label>Resume / CV</label>
        <div class="file-picker">
          <button class="file-btn" id="resume-btn">Choose File</button>
          <span class="file-name" id="resume-name">No file chosen</span>
          <button class="clear-btn" id="resume-clear" title="Remove">✕</button>
        </div>
        <input type="file" id="resume-input" accept=".pdf,.doc,.docx" hidden>
      </div>
      <div class="file-field">
        <label>Cover Letter (PDF)</label>
        <div class="file-picker">
          <button class="file-btn" id="cover-btn">Choose File</button>
          <span class="file-name" id="cover-name">No file chosen</span>
          <button class="clear-btn" id="cover-clear" title="Remove">✕</button>
        </div>
        <input type="file" id="cover-input" accept=".pdf,.doc,.docx" hidden>
      </div>
    </div>

    <div class="actions">
      <button class="btn-save" id="btn-save">Save Profile</button>
      <button class="btn-fill" id="btn-fill">Autofill Page</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
